<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fagbegrep – MFL2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #EBEBEA;
    --card: #ffffff;
    --card-back: #1C5738;
    --text: #142E1E;
    --text-light: #f5f5f3;
    --accent: #1C5738;
    --accent-hover: #134027;
    --muted: #375240;
    --border: #C2D8C8;
    --accent-light: #D5EDBA;
    --shadow: 0 8px 32px rgba(20,46,30,0.10);
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    max-width: 600px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* MODE SELECTOR */
  .mode-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin: 1.5rem 0;
    flex-wrap: wrap;
    padding: 0 1rem;
  }

  .mode-btn {
    padding: 0.55rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* TOPIC GRID */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.5rem;
    max-width: 640px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 1.5rem;
  }

  .topic-btn {
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .topic-btn:hover { border-color: var(--accent); }
  .topic-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .topic-btn span {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .topic-btn.active span { color: rgba(255,255,255,0.7); }

  /* CARD AREA */
  .card-area {
    width: 100%;
    max-width: 540px;
    padding: 0 1rem;
    perspective: 1000px;
    margin-bottom: 1rem;
  }

  .card-container {
    width: 100%;
    min-height: 260px;
    cursor: pointer;
    position: relative;
    transition: transform 0.5s, height 0.3s;
    transform-style: preserve-3d;
  }

  .card-container.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem 2.2rem;
    box-shadow: var(--shadow);
  }

  .card-front {
    background: var(--card);
  }

  .card-front .card-topic {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 0.8rem;
  }

  .card-front .card-term {
    font-family: 'DM Serif Display', serif;
    font-size: 1.65rem;
    text-align: center;
    line-height: 1.3;
  }

  .card-front .card-hint {
    margin-top: 1.2rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .card-back {
    background: var(--card-back);
    color: var(--text-light);
    transform: rotateY(180deg);
  }

  .card-back .card-term-small {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    margin-bottom: 0.8rem;
    color: var(--accent-light);
  }

  .card-back .card-definition {
    font-size: 0.92rem;
    line-height: 1.65;
    text-align: center;
    max-width: 420px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .nav-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text);
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .progress {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    min-width: 80px;
    text-align: center;
  }

  .shuffle-btn {
    padding: 0.5rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s;
  }

  .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar-container {
    max-width: 540px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 2rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* KEYBOARD HINT */
  .keyboard-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    padding-bottom: 2rem;
  }

  .keyboard-hint kbd {
    display: inline-block;
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    background: var(--card);
    margin: 0 1px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state p { font-size: 0.95rem; }

  footer {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: auto;
    line-height: 1.6;
  }

  @media (max-width: 500px) {
    header h1 { font-size: 1.6rem; }
    .card-front .card-term { font-size: 1.35rem; }
    .card-face { padding: 1.5rem 1.4rem; }
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

// Build topic list
const topics = [...new Set(TERMS.map(t => t.c))].sort();
let currentMode = 'all';
let selectedTopics = new Set();
let deck = [];
let currentIndex = 0;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const grid = document.getElementById('topicGrid');
  if (mode === 'topic') {
    grid.style.display = 'grid';
    renderTopics();
    selectedTopics.clear();
    hideCard();
  } else {
    grid.style.display = 'none';
    selectedTopics.clear();
    buildDeck();
  }
}

function renderTopics() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  topics.forEach(topic => {
    const count = TERMS.filter(t => t.c === topic).length;
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `${topic}<span>${count} begreper</span>`;
    btn.onclick = () => toggleTopic(topic, btn);
    grid.appendChild(btn);
  });
}

function toggleTopic(topic, btn) {
  if (selectedTopics.has(topic)) {
    selectedTopics.delete(topic);
    btn.classList.remove('active');
  } else {
    selectedTopics.add(topic);
    btn.classList.add('active');
  }
  if (selectedTopics.size > 0) {
    buildDeck();
  } else {
    hideCard();
  }
}

function hideCard() {
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('progressBarContainer').style.display = 'none';
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('emptyState').style.display = currentMode === 'topic' ? 'block' : 'none';
}

function buildDeck() {
  if (currentMode === 'all') {
    deck = [...TERMS];
  } else {
    deck = TERMS.filter(t => selectedTopics.has(t.c));
  }
  shuffleArray(deck);
  currentIndex = 0;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('progressBarContainer').style.display = 'block';
  document.getElementById('keyHint').style.display = 'block';
  showCard();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const term = deck[currentIndex];
  document.getElementById('cardTopic').textContent = term.c;
  document.getElementById('cardTerm').textContent = term.t;
  document.getElementById('cardTermBack').textContent = term.t;
  document.getElementById('cardDef').textContent = term.d;
  document.getElementById('progress').textContent = `${currentIndex + 1} / ${deck.length}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / deck.length) * 100}%`;
  // Adjust card height to fit definition
  requestAnimationFrame(() => {
    const front = document.querySelector('.card-front');
    const back = document.querySelector('.card-back');
    const h = Math.max(260, front.scrollHeight, back.scrollHeight);
    card.style.height = h + 'px';
  });
}

function flipCard() {
  document.getElementById('card').classList.toggle('flipped');
}

function nextCard() {
  if (currentIndex < deck.length - 1) {
    currentIndex++;
    showCard();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    showCard();
  }
}

function shuffleDeck() {
  shuffleArray(deck);
  currentIndex = 0;
  showCard();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// Touch swipe
let touchStartX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff < 0) nextCard();
    else prevCard();
  }
}, {passive: true});

// Start with all
buildDeck();
</script>
